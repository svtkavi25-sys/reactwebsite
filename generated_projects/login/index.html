<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Neon React Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
      color: #00ffcc;
      
    }
    .preview-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 5vw, 48px);
    }
    .preview-card {
      width: min(1100px, 100%);
      padding: clamp(24px, 4vw, 48px);
      border-radius: 4px;
      background: rgba(10, 10, 15, 0.9);
      box-shadow: 0 0 30px rgba(255, 0, 255, 0.4), 10px 10px 0px rgba(0, 255, 204, 0.2);
      border: 1px solid #ff00ff;
      
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .preview-card:hover {
        transform: scale(1.01);
    }
    .preview-title {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 2.4vw, 2.8rem);
      color: #00ffcc;
    }
    .preview-subtitle {
      margin: 0 0 26px;
      color: rgba(226, 232, 240, 0.82);
      line-height: 1.7;
      max-width: 820px;
    }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="preview-card">
      <h2 class="preview-title">Neon Genesis</h2>
      <p class="preview-subtitle">High-octane aesthetic with vibrant glowing elements.</p>
      <div id="root"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect } = React;

        window.saveData = async (payload) => {
            try {
                const response = await fetch('/api/save_project_data/9/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                console.error('Failed to save data:', err);
                return { status: 'error', message: err.message };
            }
        };
        
try {
function App() {
    // State for the username and password input fields
    const [usernameInput, setUsernameInput] = React.useState('');
    const [passwordInput, setPasswordInput] = React.useState('');

    // State for the currently logged-in user.
    // Initialized by checking localStorage to see if a user was previously logged in.
    const [currentUser, setCurrentUser] = React.useState(() => {
        // This function runs only once during the component's initial render
        // to retrieve the stored user from localStorage.
        return localStorage.getItem('loggedInUser');
    });

    /**
     * Handles the login process.
     * Stores the username in localStorage and updates component state.
     * Calls window.saveData to persist the login action.
     */
    const handleLogin = () => {
        if (usernameInput && passwordInput) {
            localStorage.setItem('loggedInUser', usernameInput);
            setCurrentUser(usernameInput); // Update state to trigger re-render

            // Call the global saveData function to log the login event
            if (typeof window.saveData === 'function') {
                window.saveData({
                    action: "login",
                    username: usernameInput,
                    time: Date.now()
                });
            }

            // Clear the password field after login for security and UI cleanliness
            setPasswordInput('');
        } else {
            // Basic validation
            alert('Please enter both username and password to log in.');
        }
    };

    /**
     * Handles the logout process.
     * Clears the username from localStorage and updates component state.
     * Calls window.saveData to persist the logout action.
     */
    const handleLogout = () => {
        const loggedOutUser = currentUser; // Capture current user before clearing state
        localStorage.removeItem('loggedInUser');
        setCurrentUser(null); // Clear state to trigger re-render (show login form)

        // Optionally clear the username input field as well
        setUsernameInput('');

        // Call the global saveData function to log the logout event
        if (typeof window.saveData === 'function') {
            window.saveData({
                action: "logout",
                username: loggedOutUser, // Use the captured username
                time: Date.now()
            });
        }
    };

    // --- Simple Inline Styles for Clean UI ---
    const containerStyle = {
        fontFamily: 'Arial, sans-serif',
        maxWidth: '400px',
        margin: '50px auto',
        padding: '25px',
        border: '1px solid #e0e0e0',
        borderRadius: '10px',
        boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
        backgroundColor: '#fff',
        textAlign: 'center'
    };

    const inputStyle = {
        width: 'calc(100% - 24px)', // Account for padding
        padding: '12px',
        margin: '10px 0',
        border: '1px solid #ccc',
        borderRadius: '5px',
        fontSize: '16px'
    };

    const buttonStyle = {
        backgroundColor: '#007bff',
        color: 'white',
        padding: '12px 20px',
        border: 'none',
        borderRadius: '5px',
        cursor: 'pointer',
        fontSize: '16px',
        marginTop: '15px',
        transition: 'background-color 0.2s ease'
    };

    const logoutButtonStyle = {
        ...buttonStyle, // Inherit base button styles
        backgroundColor: '#dc3545',
        marginRight: '0' // Remove right margin if only one button
    };
    
    // Add hover effect for buttons
    buttonStyle[':hover'] = { backgroundColor: '#0056b3' };
    logoutButtonStyle[':hover'] = { backgroundColor: '#c82333' };

    const headingStyle = {
        color: '#333',
        marginBottom: '20px'
    };

    const welcomeMessageStyle = {
        fontSize: '1.8em',
        color: '#007bff',
        marginBottom: '25px'
    };

    return (
        <div style={containerStyle}>
            {currentUser ? (
                // If a user is logged in, display a welcome message and a logout button
                <div>
                    <h2 style={welcomeMessageStyle}>Welcome, {currentUser}!</h2>
                    <button
                        style={logoutButtonStyle}
                        onClick={handleLogout}
                    >
                        Logout
                    </button>
                </div>
            ) : (
                // If no user is logged in, display the login form
                <div>
                    <h2 style={headingStyle}>Login to Your Account</h2>
                    <div>
                        <input
                            type="text"
                            placeholder="Username"
                            value={usernameInput}
                            onChange={(e) => setUsernameInput(e.target.value)}
                            style={inputStyle}
                        />
                    </div>
                    <div>
                        <input
                            type="password" // Use type="password" for security
                            placeholder="Password"
                            value={passwordInput}
                            onChange={(e) => setPasswordInput(e.target.value)}
                            style={inputStyle}
                        />
                    </div>
                    <button
                        style={buttonStyle}
                        onClick={handleLogin}
                    >
                        Login
                    </button>
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
} catch (error) {
  console.error(error);
  function App() {
    return (
      <div>
        <h3 style={{ color: 'red' }}>❌ React Error</h3>
        <pre>{String(error)}</pre>
      </div>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
}
  </script>
</body>
</html>
