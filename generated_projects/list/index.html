<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frost Glass React Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 20%), radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.12), transparent 18%), #0f172a;
      color: #e2e8f0;
    }
    .preview-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .preview-card {
      width: min(1100px, 100%);
      padding: 32px;
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.82);
      box-shadow: 0 28px 90px rgba(15, 23, 42, 0.36);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }
    .preview-title {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 2.4vw, 2.8rem);
      color: #e2e8f0;
    }
    .preview-subtitle {
      margin: 0 0 26px;
      color: rgba(226, 232, 240, 0.82);
      line-height: 1.7;
      max-width: 820px;
    }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="preview-card">
      <h2 class="preview-title">Frost Glass</h2>
      <p class="preview-subtitle">A cool, glassy look with gentle ice-blue accents.</p>
      <div id="root"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect } = React;

try {
function App() {
  // Strict Rule: Must use React.useState
  const [searchTerm, setSearchTerm] = React.useState('');
  // Simple hardcoded list of items
  const items = [
    { id: 1, name: 'Apple' },
    { id: 2, name: 'Banana' },
    { id: 3, name: 'Cherry' },
    { id: 4, name: 'Date' },
    { id: 5, name: 'Elderberry' },
    { id: 6, name: 'Fig' },
    { id: 7, name: 'Grape' },
  ];
  // Filter items based on the search term
  const filteredItems = items.filter(item =>
    item.name.toLowerCase().includes(searchTerm.toLowerCase())
  );
  // Handle input change
  const handleSearchChange = (event) => {
    setSearchTerm(event.target.value);
  };
  // Strict Rule: Must return JSX
  return (
    <div>
      <h1>Fruit Search Filter</h1>
      <input
        type="text"
        placeholder="Search fruits..."
        value={searchTerm}
        onChange={handleSearchChange}
        style={{ padding: '8px', fontSize: '16px', width: '250px' }}
      />
      <ul style={{ listStyleType: 'none', padding: 0 }}>
        {filteredItems.length > 0 ? (
          filteredItems.map(item => (
            <li key={item.id} style={{ padding: '5px 0', borderBottom: '1px solid #eee' }}>
              {item.name}
            </li>
          ))
        ) : (
          <p>No items found.</p>
        )}
      </ul>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
} catch (error) {
  console.error(error);
  function App() {
    return (
      <div>
        <h3 style={{ color: 'red' }}>❌ React Error</h3>
        <pre>{String(error)}</pre>
      </div>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
}
  </script>
</body>
</html>
