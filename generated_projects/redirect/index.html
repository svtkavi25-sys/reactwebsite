<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Royal Gold React Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Playfair Display', serif;
      background: #faf9f6;
      color: #1a1a1a;
      
    }
    .preview-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 5vw, 48px);
    }
    .preview-card {
      width: min(1100px, 100%);
      padding: clamp(24px, 4vw, 48px);
      border-radius: 0px;
      background: #ffffff;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      border: 1px solid #d4af37;
      
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .preview-card:hover {
        transform: scale(1.01);
    }
    .preview-title {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 2.4vw, 2.8rem);
      color: #1a1a1a;
    }
    .preview-subtitle {
      margin: 0 0 26px;
      color: rgba(226, 232, 240, 0.82);
      line-height: 1.7;
      max-width: 820px;
    }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="preview-card">
      <h2 class="preview-title">Imperial Essence</h2>
      <p class="preview-subtitle">Sophisticated cream and gold for a premium, timeless feel.</p>
      <div id="root"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect } = React;

        window.saveData = async (payload) => {
            try {
                const response = await fetch('/api/save_project_data/13/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                console.error('Failed to save data:', err);
                return { status: 'error', message: err.message };
            }
        };

        window.loadData = async () => {
            try {
                const response = await fetch('/api/get_project_data/13/');
                return await response.json();
            } catch (err) {
                console.error('Failed to load data:', err);
                return [];
            }
        };
        
try {
function App() {
  const [page, setPage] = React.useState("home");
  const [username, setUsername] = React.useState(null);
  const [dataInput, setDataInput] = React.useState("");
  const [savedData, setSavedData] = React.useState([]);
  const [isLoading, setIsLoading] = React.useState(true);

  React.useEffect(() => {
    // Check for login status from localStorage
    const storedUsername = localStorage.getItem("username");
    if (storedUsername) {
      setUsername(storedUsername);
      setPage("dashboard"); // Automatically navigate to dashboard if logged in
    }

    // Load historical data from the database
    window.loadData()
      .then(data => {
        // Assuming each item in data array has a 'payload' property
        const parsedData = data.map(item => item.payload);
        setSavedData(parsedData);
      })
      .catch(error => console.error("Error loading data:", error))
      .finally(() => setIsLoading(false));
  }, []); // Empty dependency array means this effect runs once on mount

  const handleLogin = (e) => {
    e.preventDefault(); // Prevent page reload on form submission
    if (dataInput) {
      localStorage.setItem("username", dataInput);
      setUsername(dataInput);
      setDataInput(""); // Clear the input field
      setPage("dashboard");
    }
  };

  const handleLogout = () => {
    localStorage.removeItem("username");
    setUsername(null);
    setPage("home");
  };

  const handleAddData = () => {
    if (dataInput) {
      const newDataItem = { text: dataInput, username: username, timestamp: Date.now() };
      window.saveData(newDataItem)
        .then(() => {
          setSavedData(prevData => [...prevData, newDataItem]); // Optimistically update UI
          setDataInput(""); // Clear input field
          setPage("viewData"); // Navigate to view data after successful save
        })
        .catch(error => console.error("Error saving data:", error));
    }
  };

  if (isLoading) {
    return <div>Loading...</div>;
  }

  // Conditional rendering based on the 'page' state
  let content;
  if (page === "home") {
    content = (
      <div>
        <h1>Home Page</h1>
        <button onClick={() => setPage("login")}>Login</button>
        <button onClick={() => setPage("viewData")}>View Data</button>
      </div>
    );
  } else if (page === "login") {
    // If already logged in, redirect to dashboard
    if (username) {
      setPage("dashboard");
      return null; // Render nothing temporarily while redirecting
    }
    content = (
      <div>
        <h1>Login Page</h1>
        <form onSubmit={handleLogin}>
          <input
            type="text"
            placeholder="Enter Username"
            value={dataInput}
            onChange={(e) => setDataInput(e.target.value)}
          />
          <button type="submit">Login</button>
        </form>
        <button onClick={() => setPage("home")}>Back to Home</button>
      </div>
    );
  } else if (page === "dashboard") {
    // If not logged in, redirect to home
    if (!username) {
      setPage("home");
      return null; // Render nothing temporarily while redirecting
    }
    content = (
      <div>
        <h1>Welcome, {username}!</h1>
        <h2>Dashboard Page</h2>
        <button onClick={() => setPage("addData")}>Add Data</button>
        <button onClick={() => setPage("viewData")}>View Data</button>
        <button onClick={handleLogout}>Logout</button>
      </div>
    );
  } else if (page === "addData") {
    // Must be logged in to add data
    if (!username) {
      setPage("home");
      return null;
    }
    content = (
      <div>
        <h1>Add Data Page</h1>
        <input
          type="text"
          placeholder="Enter data to save"
          value={dataInput}
          onChange={(e) => setDataInput(e.target.value)}
        />
        <button onClick={handleAddData}>Save Data</button>
        <button onClick={() => setPage("dashboard")}>Back to Dashboard</button>
      </div>
    );
  } else if (page === "viewData") {
    content = (
      <div>
        <h1>View Data Page</h1>
        <h2>Stored Data:</h2>
        {savedData.length === 0 ? (
          <p>No data stored yet.</p>
        ) : (
          <ul>
            {savedData.map((item, index) => (
              <li key={index}>
                "{item.text}" by {item.username || "Unknown"} at {new Date(item.timestamp).toLocaleString()}
              </li>
            ))}
          </ul>
        )}
        {username ? (
          <button onClick={() => setPage("dashboard")}>Back to Dashboard</button>
        ) : (
          <button onClick={() => setPage("home")}>Back to Home</button>
        )}
      </div>
    );
  } else {
    // Fallback for an unknown page state
    content = <div>Page Not Found</div>;
  }

  return content;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
} catch (error) {
  console.error(error);
  function App() {
    return (
      <div>
        <h3 style={{ color: 'red' }}>❌ React Error</h3>
        <pre>{String(error)}</pre>
      </div>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
}
  </script>
</body>
</html>
